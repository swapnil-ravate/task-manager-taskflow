name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install backend dependencies
        run: cd backend && npm install
      - name: Run backend tests
        run: cd backend && npm test -- --passWithNoTests

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: cd frontend && npm install
      - name: Run frontend tests
        run: cd frontend && CI=true npm test -- --passWithNoTests
      - name: Build frontend
        run: cd frontend && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build backend image
        run: docker build ./backend -t taskflow-backend
      - name: Build frontend image
        run: docker build ./frontend -t taskflow-frontend

# PIPELINE FLOW DIAGRAM:
# Push to any branch:
# Code Push → test-backend → docker-build ✅
#           → test-frontend ↗
#
# Push to main branch:
# Code Push → test-backend → push-to-dockerhub → deploy 🚀
#           → test-frontend ↗
