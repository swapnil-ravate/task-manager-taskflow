# CI Pipeline
#
# PIPELINE FLOW DIAGRAM:
# Push to any branch:
# Code Push → test-backend → docker-build ✅
#           → test-frontend ↗
#
# Push to main branch:
# Code Push → test-backend → push-to-dockerhub → deploy 🚀
#           → test-frontend ↗
#
# NOTE: Frontend (React/Vite) lives at the project root.
#       Backend (Node/Express) lives in ./backend/

name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Run backend tests
        run: cd backend && npm test -- --passWithNoTests

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test
        env:
          CI: true

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        run: docker build ./backend -t taskflow-backend

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile . -t taskflow-frontend
