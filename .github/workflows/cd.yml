name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  push-to-dockerhub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Sanitize Docker Username
        id: sanitize_user
        run: |
          USERNAME=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr -d '\n\r ')
          echo "clean_username=$USERNAME" >> $GITHUB_ENV
          
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ env.clean_username }}/taskflow-backend:latest,${{ env.clean_username }}/taskflow-backend:${{ github.sha }}
            
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.clean_username }}/taskflow-frontend:latest,${{ env.clean_username }}/taskflow-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: push-to-dockerhub
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Deploy to Render
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is not set."
            exit 1
          fi
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
